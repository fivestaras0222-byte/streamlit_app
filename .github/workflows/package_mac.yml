name: Pack Streamlit to APP
on: [push]

jobs:
  build_macos:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install pyinstaller streamlit

      - name: Create Launcher Script
        shell: bash
        run: |
          cat > run_app.py << 'EOF'
          import streamlit.web.cli as stcli
          import os, sys
          
          def resolve_path(path):
              if getattr(sys, 'frozen', False):
                  return os.path.join(sys._MEIPASS, path)
              return path

          if __name__ == '__main__':
              sys.argv = [
                  'streamlit',
                  'run',
                  resolve_path('app_final_combined.py'),
                  '--global.developmentMode=false',
              ]
              sys.exit(stcli.main())
          EOF

      - name: Create PyInstaller Spec File
        shell: bash
        run: |
          cat > run_app.spec << 'EOF'
          # -*- mode: python ; coding: utf-8 -*-
          from PyInstaller.utils.hooks import collect_all

          # 自动收集 streamlit 的所有资源文件，防止页面空白
          datas, binaries, hiddenimports = collect_all('streamlit')

          # 加入你自己的业务文件
          datas += [
              ('app_final_combined.py', '.'),
              ('feature_order.py', '.'),
              ('survcurve.py', '.'),
              ('survcurve_cn.py', '.'),
              ('models', 'models'),
              ('xgb_scaler.pkl', '.'),
          ]
          
          # 加入你提到的所有机器学习库
          hiddenimports += [
              'pandas', 'numpy', 'plotly', 'xgboost', 'sklearn', 
              'shap', 'matplotlib', 'PIL', 'joblib', 'scipy', 
              'torch', 'lifelines', 'sklearn.linear_model', 'sklearn.ensemble'
          ]

          a = Analysis(
              ['run_app.py'],
              pathex=[],
              binaries=binaries,
              datas=datas,
              hiddenimports=hiddenimports,
              hookspath=[],
              hooksconfig={},
              runtime_hooks=[],
              excludes=[],
              win_no_prefer_redirects=False,
              win_private_assemblies=False,
              cipher=None,
              noarchive=False,
          )

          pyz = PYZ(a.pure, a.zipped_data, cipher=None)

          exe = EXE(
              pyz,
              a.scripts,
              [],
              exclude_binaries=True,
              name='HCC_Survival_Predictor',
              debug=False,
              bootloader_ignore_signals=False,
              strip=False,
              upx=True,
              console=False,
              disable_windowed_traceback=False,
              argv_emulation=False,
              target_arch=None,
              codesign_identity=None,
              entitlements_file=None,
          )

          coll = COLLECT(
              exe,
              a.binaries,
              a.zipfiles,
              a.datas,
              strip=False,
              upx=True,
              upx_exclude=[],
              name='HCC_Survival_Predictor',
          )
          EOF

      - name: Build APP with PyInstaller
        shell: bash
        run: |
          pyinstaller --noconfirm run_app.spec

      - name: Upload Finished APP
        uses: actions/upload-artifact@v4
        with:
          name: HCC-Survival-Predictor-MacOS
          path: dist/HCC_Survival_Predictor/HCC_Survival_Predictor
